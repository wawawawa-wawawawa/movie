<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>家で映画を楽しむ方法</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Noto Serif JP', serif;
      background: linear-gradient(to bottom, #f0faff, #e3eef4);
      color: #858585;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 50px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    h1 {
      font-size: 2.8em;
      text-align: center;
      margin-bottom: 30px;
      color: #858585;
      position: relative;
      animation: popIn 1.6s ease-in-out;
    }

    h1::after {
      content: "";
      display: block;
      width: 80px;
      height: 4px;
      background: #bccbdb;
      margin: 12px auto 0;
      border-radius: 2px;
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.85) translateY(-20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    h2 {
      font-size: 1.6em;
      margin-top: 40px;
      border-left: 5px solid #bccbdb;
      padding-left: 12px;
    }

    p {
      font-size: 1.1em;
      margin-top: 10px;
    }

    .image-section {
      text-align: center;
      margin: 30px 0;
    }

    .image-section img {
      max-width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    .tip-box {
      background: #f0f8fb;
      border-left: 6px solid #bccbdb;
      padding: 15px 20px;
      border-radius: 10px;
      margin-top: 20px;
      font-size: 1em;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 50px;
      text-decoration: none;
      background-color: #bccbdb;
      padding: 14px 28px;
      color: #858585;
      border-radius: 10px;
      font-weight: bold;
      font-size: 1.1em;
      transition: background-color 0.3s;
    }

    .back-link:hover {
      background-color: #bccbdb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>家で映画を楽しむ方法</h1>
    <p style="text-align: center; font-size: 1.2em;">家でも映画を最高に楽しむ方法を紹介します。</p>

    

    <h2>環境</h2>
    <p>照明を落とし、カーテンを閉めて映画に集中できる環境をつくりましょう。</p>
    <p>柔らかいブランケットやクッションもおすすめ。</p>

    
    <h2>アプリ</h2>
    <p>おすすめアプリを紹介。（アンケート結果上位二つ）</p>
    <p>・Netflix</p>
    <p>  ￥890〜/月</p>
    <p></p>
    <p>・Amazon Praim Video</p>
    <p>￥890〜/月</p>

    
    
    <h2>ご飯</h2>
    <p>ポップコーン、ホットチョコ、軽食を用意すれば気分は映画館。好きな飲み物で映画をさらに楽しく！</p>

    

    <a href="index.html" class="back-link">トップページに戻る</a>
  </div>
</body>
</html>
